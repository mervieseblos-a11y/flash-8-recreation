<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flash 8 Animation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #2b2b2b;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #menu {
      background-color: #1e1e1e;
      padding: 8px;
      border-bottom: 1px solid #444;
      display: flex;
      gap: 10px;
    }
    #menu button {
      background-color: #404040;
      color: #fff;
      border: 1px solid #555;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 3px;
      font-size: 12px;
    }
    #menu button:hover {
      background-color: #505050;
    }
    #container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #toolbar {
      width: 60px;
      background-color: #2b2b2b;
      border-right: 1px solid #444;
      padding: 10px 5px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    #toolbar button {
      width: 50px;
      height: 50px;
      background-color: #404040;
      color: #fff;
      border: 1px solid #555;
      cursor: pointer;
      border-radius: 3px;
      font-size: 10px;
    }
    #toolbar button:hover {
      background-color: #505050;
    }
    #toolbar button.active {
      background-color: #0078d4;
    }
    #main {
      display: flex;
      flex: 1;
    }
    #layers {
      width: 250px;
      background-color: #252526;
      border-right: 1px solid #444;
      overflow-y: auto;
      padding: 10px;
      font-size: 12px;
    }
    #canvas-area {
      flex: 1;
      background-color: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #canvas {
      background-color: #fff;
      cursor: crosshair;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    #properties {
      width: 250px;
      background-color: #252526;
      border-left: 1px solid #444;
      overflow-y: auto;
      padding: 10px;
      font-size: 12px;
    }
    #timeline {
      height: 150px;
      background-color: #252526;
      border-top: 1px solid #444;
      overflow-x: auto;
      padding: 10px;
      font-size: 12px;
    }
    .panel-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #0078d4;
    }
  </style>
</head>
<body>
  <div id="menu">
    <button onclick="newProject()">New</button>
    <button onclick="openProject()">Open</button>
    <button onclick="saveProject()">Save</button>
    <button onclick="playAnimation()">Play</button>
  </div>

  <div id="container">
    <div id="toolbar">
      <button title="Selection Tool" class="tool-btn" data-tool="select">✓</button>
      <button title="Rectangle Tool" class="tool-btn" data-tool="rectangle">□</button>
      <button title="Circle Tool" class="tool-btn" data-tool="circle">○</button>
      <button title="Pencil Tool" class="tool-btn" data-tool="pencil">✏</button>
      <button title="Text Tool" class="tool-btn" data-tool="text">T</button>
      <button title="Line Tool" class="tool-btn" data-tool="line">/</button>
    </div>

    <div id="main">
      <div id="layers">
        <div class="panel-title">Layers</div>
        <div id="layers-list">
          <div style="padding: 5px; background-color: #2b2b2b; border-radius: 3px; cursor: pointer; margin-bottom: 5px;">
            Layer 1
          </div>
        </div>
        <button style="width: 100%; margin-top: 10px; padding: 5px;">+ Add Layer</button>
      </div>

      <div id="canvas-area">
        <canvas id="canvas" width="1000" height="600"></canvas>
      </div>

      <div id="properties">
        <div class="panel-title">Properties</div>
        <div style="font-size: 11px;">
          <label>X: <input type="number" value="0" style="width: 60px; padding: 3px;"></label><br>
          <label>Y: <input type="number" value="0" style="width: 60px; padding: 3px;"></label><br>
          <label>Width: <input type="number" value="100" style="width: 60px; padding: 3px;"></label><br>
          <label>Height: <input type="number" value="100" style="width: 60px; padding: 3px;"></label><br>
          <label>Fill: <input type="color" value="#0078d4" style="width: 40px; height: 25px;"></label><br>
          <label>Stroke: <input type="color" value="#000000" style="width: 40px; height: 25px;"></label>
        </div>
      </div>
    </div>
  </div>

  <div id="timeline">
    <div class="panel-title">Timeline</div>
    <div style="display: flex; gap: 10px; align-items: center;">
      <span>Frame: <input type="number" value="1" style="width: 50px; padding: 3px;"></span>
      <span>Rate: 24 fps</span>
      <button style="padding: 5px 10px;">< Prev</button>
      <button style="padding: 5px 10px;">Play</button>
      <button style="padding: 5px 10px;">Next ></button>
    </div>
  </div>

  <script>
    // State management
    const state = {
      objects: [],
      selectedId: null,
      currentTool: 'select',
      isDragging: false,
      isDrawing: false,
      startX: 0,
      startY: 0,
      dragOffsetX: 0,
      dragOffsetY: 0,
      fillColor: '#0078d4',
      strokeColor: '#000000',
      strokeWidth: 2,
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const layersList = document.getElementById('layers-list');
    const propertiesDiv = document.querySelector('#properties > div:last-child');

    // Utility functions
    function generateId() {
      return 'obj-' + Date.now() + Math.random().toString(36).substr(2, 9);
    }

    function getMousePos(e) {
      return {
        x: e.offsetX,
        y: e.offsetY
      };
    }

    function getObjectAtPoint(x, y) {
      for (let i = state.objects.length - 1; i >= 0; i--) {
        const obj = state.objects[i];
        if (x >= obj.x && x <= obj.x + obj.width &&
            y >= obj.y && y <= obj.y + obj.height) {
          return obj;
        }
      }
      return null;
    }

    // Drawing functions
    function drawObjects() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 0.5;
      
      // Draw grid
      for (let x = 0; x < canvas.width; x += 20) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 20) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Draw all objects
      state.objects.forEach(obj => {
        ctx.fillStyle = obj.fillColor;
        ctx.strokeStyle = obj.strokeColor;
        ctx.lineWidth = obj.strokeWidth;

        if (obj.type === 'rectangle') {
          ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
          ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
        } else if (obj.type === 'circle') {
          ctx.beginPath();
          ctx.ellipse(obj.x + obj.width/2, obj.y + obj.height/2, obj.width/2, obj.height/2, 0, 0, 2*Math.PI);
          ctx.fill();
          ctx.stroke();
        } else if (obj.type === 'line') {
          ctx.beginPath();
          ctx.moveTo(obj.x, obj.y);
          ctx.lineTo(obj.x + obj.width, obj.y + obj.height);
          ctx.stroke();
        } else if (obj.type === 'pencil' && obj.points && obj.points.length > 0) {
          // Draw vector pencil path
          ctx.strokeStyle = obj.fillColor;
          ctx.lineWidth = 2;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.beginPath();
          ctx.moveTo(obj.points[0].x, obj.points[0].y);
          for (let i = 1; i < obj.points.length; i++) {
            ctx.lineTo(obj.points[i].x, obj.points[i].y);
          }
          ctx.stroke();
        }

        // Draw selection handles
        if (obj.id === state.selectedId) {
          ctx.fillStyle = '#ffffff';
          ctx.strokeStyle = '#0078d4';
          ctx.lineWidth = 2;
          const handleSize = 8;
          const handles = [
            [obj.x - handleSize/2, obj.y - handleSize/2],
            [obj.x + obj.width - handleSize/2, obj.y - handleSize/2],
            [obj.x + obj.width - handleSize/2, obj.y + obj.height - handleSize/2],
            [obj.x - handleSize/2, obj.y + obj.height - handleSize/2],
          ];
          handles.forEach(h => {
            ctx.fillRect(h[0], h[1], handleSize, handleSize);
            ctx.strokeRect(h[0], h[1], handleSize, handleSize);
          });

          // Dashed bounding box
          ctx.setLineDash([4, 4]);
          ctx.strokeStyle = '#0078d4';
          ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
          ctx.setLineDash([]);
        }
      });
    }

    function updatePropertiesPanel() {
      if (!state.selectedId) {
        propertiesDiv.innerHTML = '<p style="color: #999;">No object selected</p>';
        return;
      }

      const obj = state.objects.find(o => o.id === state.selectedId);
      if (!obj) return;

      propertiesDiv.innerHTML = `
        <label>X: <input type="number" value="${obj.x}" onchange="updateObjectProperty('x', this.value)"></label><br>
        <label>Y: <input type="number" value="${obj.y}" onchange="updateObjectProperty('y', this.value)"></label><br>
        <label>Width: <input type="number" value="${obj.width}" onchange="updateObjectProperty('width', this.value)"></label><br>
        <label>Height: <input type="number" value="${obj.height}" onchange="updateObjectProperty('height', this.value)"></label><br>
        <label>Fill: <input type="color" value="${obj.fillColor}" onchange="updateObjectProperty('fillColor', this.value)"></label><br>
        <label>Stroke: <input type="color" value="${obj.strokeColor}" onchange="updateObjectProperty('strokeColor', this.value)"></label>
      `;
    }

    function updateLayersPanel() {
      layersList.innerHTML = state.objects.map(obj => `
        <div style="padding: 5px; background-color: ${obj.id === state.selectedId ? '#0078d4' : '#2b2b2b'}; border-radius: 3px; cursor: pointer; margin-bottom: 5px;"
             onclick="selectObject('${obj.id}')" title="${obj.type}">
          ${obj.type} #${obj.id.slice(-5)}
        </div>
      `).join('');
    }

    // Tool selection
    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        state.currentTool = this.dataset.tool;
      });
    });

    // Set selection tool as default
    document.querySelector('[data-tool="select"]').classList.add('active');

    // Canvas events
    canvas.addEventListener('mousedown', (e) => {
      const pos = getMousePos(e);
      const obj = getObjectAtPoint(pos.x, pos.y);

      if (state.currentTool === 'select') {
        if (obj) {
          selectObject(obj.id);
          state.isDragging = true;
          state.dragOffsetX = pos.x - obj.x;
          state.dragOffsetY = pos.y - obj.y;
        } else {
          selectObject(null);
        }
      } else {
        state.isDrawing = true;
        state.startX = pos.x;
        state.startY = pos.y;
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      const pos = getMousePos(e);

      if (state.isDragging && state.selectedId) {
        const obj = state.objects.find(o => o.id === state.selectedId);
        obj.x = pos.x - state.dragOffsetX;
        obj.y = pos.y - state.dragOffsetY;
        updatePropertiesPanel();
        drawObjects();
      } else if (state.isDrawing) {
        if (state.currentTool === 'pencil') {
          // Draw pencil strokes in real-time
          if (!state.pencilPoints) {
            state.pencilPoints = [{ x: state.startX, y: state.startY }];
          }
          state.pencilPoints.push(pos);

          // Redraw and draw pencil path
          drawObjects();

          ctx.strokeStyle = state.fillColor;
          ctx.lineWidth = 2;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';

          // Draw all pencil points as smooth curve
          if (state.pencilPoints.length > 1) {
            ctx.beginPath();
            ctx.moveTo(state.pencilPoints[0].x, state.pencilPoints[0].y);
            for (let i = 1; i < state.pencilPoints.length; i++) {
              ctx.lineTo(state.pencilPoints[i].x, state.pencilPoints[i].y);
            }
            ctx.stroke();
          }
        } else {
          drawObjects();

          // Draw preview for other tools
          ctx.fillStyle = 'rgba(0, 120, 212, 0.3)';
          ctx.strokeStyle = '#0078d4';
          ctx.lineWidth = 2;

          const width = pos.x - state.startX;
          const height = pos.y - state.startY;

          if (state.currentTool === 'rectangle') {
            ctx.fillRect(state.startX, state.startY, width, height);
            ctx.strokeRect(state.startX, state.startY, width, height);
          } else if (state.currentTool === 'circle') {
            ctx.beginPath();
            ctx.ellipse(state.startX + width/2, state.startY + height/2, Math.abs(width/2), Math.abs(height/2), 0, 0, 2*Math.PI);
            ctx.fill();
            ctx.stroke();
          } else if (state.currentTool === 'line') {
            ctx.beginPath();
            ctx.moveTo(state.startX, state.startY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
          }
        }
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      state.isDragging = false;

      if (state.isDrawing && state.currentTool !== 'select') {
        const pos = getMousePos(e);
        const width = pos.x - state.startX;
        const height = pos.y - state.startY;

        if (state.currentTool === 'pencil') {
          // Save pencil path as vector object
          if (state.pencilPoints && state.pencilPoints.length > 3) {
            const newObj = {
              id: generateId(),
              type: 'pencil',
              points: state.pencilPoints,
              x: Math.min(...state.pencilPoints.map(p => p.x)),
              y: Math.min(...state.pencilPoints.map(p => p.y)),
              width: Math.max(...state.pencilPoints.map(p => p.x)) - Math.min(...state.pencilPoints.map(p => p.x)),
              height: Math.max(...state.pencilPoints.map(p => p.y)) - Math.min(...state.pencilPoints.map(p => p.y)),
              fillColor: state.fillColor,
              strokeColor: state.fillColor,
              strokeWidth: 2,
            };
            state.objects.push(newObj);
            updateLayersPanel();
          }
          state.pencilPoints = null;
        } else if (Math.abs(width) > 5 || Math.abs(height) > 5) {
          const newObj = {
            id: generateId(),
            type: state.currentTool,
            x: Math.min(state.startX, pos.x),
            y: Math.min(state.startY, pos.y),
            width: Math.abs(width),
            height: Math.abs(height),
            fillColor: state.fillColor,
            strokeColor: state.strokeColor,
            strokeWidth: state.strokeWidth,
          };
          state.objects.push(newObj);
          updateLayersPanel();
        }
      }

      state.isDrawing = false;
      drawObjects();
    });

    canvas.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' && state.selectedId) {
        state.objects = state.objects.filter(o => o.id !== state.selectedId);
        selectObject(null);
        updateLayersPanel();
        drawObjects();
      }
    });

    // Global functions
    window.selectObject = function(id) {
      state.selectedId = id;
      updatePropertiesPanel();
      updateLayersPanel();
      drawObjects();
    };

    window.updateObjectProperty = function(prop, value) {
      if (!state.selectedId) return;
      const obj = state.objects.find(o => o.id === state.selectedId);
      obj[prop] = isNaN(value) ? value : parseFloat(value);
      updatePropertiesPanel();
      drawObjects();
    };

    window.newProject = function() {
      state.objects = [];
      selectObject(null);
      updateLayersPanel();
      drawObjects();
      console.log('New project created');
    };

    window.openProject = function() {
      alert('Open project (file dialog would appear here)');
    };

    window.saveProject = function() {
      const project = {
        version: '1.0.0',
        objects: state.objects,
      };
      console.log('Project saved:', project);
      alert('Project saved to console');
    };

    window.playAnimation = function() {
      alert('Play animation');
    };

    // Initialize
    drawObjects();
  </script>
</body>
</html>
